name: Release

on:
  push:
    tags:
      - "v[0-9]*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  PACKAGE_NAME: ezdgn
  PYTHON_VERSION: "3.12"

jobs:
  preflight:
    name: Test and validate release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Validate package and tag versions
        id: version
        shell: bash
        run: |
          python - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          project = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          workspace = tomllib.loads(Path("Cargo.toml").read_text(encoding="utf-8"))

          python_version = project["project"]["version"]
          rust_version = workspace["workspace"]["package"]["version"]
          if python_version != rust_version:
              raise SystemExit(
                  f"Version mismatch: pyproject.toml={python_version}, "
                  f"Cargo.toml={rust_version}"
              )

          if os.environ["GITHUB_REF_TYPE"] == "tag":
              expected_tag = f"v{python_version}"
              actual_tag = os.environ["GITHUB_REF_NAME"]
              if actual_tag != expected_tag:
                  raise SystemExit(
                      f"Tag/version mismatch: expected {expected_tag}, got {actual_tag}"
                  )

          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as output:
              print(f"version={python_version}", file=output)
          PY

      - name: Ensure version is not already published
        if: github.ref_type == 'tag'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          python - <<'PY'
          import os
          import urllib.error
          import urllib.request

          package = os.environ["PACKAGE_NAME"]
          version = os.environ["VERSION"]
          url = f"https://pypi.org/pypi/{package}/{version}/json"

          try:
              with urllib.request.urlopen(url, timeout=30):
                  pass
          except urllib.error.HTTPError as error:
              if error.code == 404:
                  raise SystemExit(0)
              raise

          raise SystemExit(
              f"{package} {version} is already published on PyPI. "
              "Published files cannot be replaced; bump the package version "
              "and create a matching new version tag instead."
          )
          PY

      - name: Create development environment
        run: |
          python -m venv .venv
          echo "VENV_PY=.venv/bin/python" >> "${GITHUB_ENV}"

      - name: Install build and test dependencies
        run: |
          "${VENV_PY}" -m pip install "maturin>=1.13,<2.0" pytest matplotlib

      - name: Check Rust formatting
        run: cargo fmt --all --check

      - name: Lint Rust
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

      - name: Test Rust workspace
        run: cargo test --workspace --locked

      - name: Install extension for tests
        run: |
          "${VENV_PY}" -m maturin develop --release --locked

      - name: Test Python package
        run: |
          "${VENV_PY}" -m pytest

  build-wheels:
    name: Build wheel (${{ matrix.name }})
    needs: preflight
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: "2014"
          - name: linux-aarch64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            manylinux: "2014"
          - name: macos-universal2
            os: macos-latest
            target: universal2-apple-darwin
            manylinux: auto
          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: auto

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          target: ${{ matrix.target }}
          args: --release --locked --out dist
          manylinux: ${{ matrix.manylinux }}

      - name: Upload wheel
        uses: actions/upload-artifact@v6
        with:
          name: wheel-${{ matrix.name }}
          path: dist/*.whl
          if-no-files-found: error
          retention-days: 7

  build-sdist:
    name: Build source distribution
    needs: preflight
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Build source distribution
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - name: Upload source distribution
        uses: actions/upload-artifact@v6
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error
          retention-days: 7

  assemble:
    name: Assemble release artifacts
    needs:
      - preflight
      - build-wheels
      - build-sdist
    runs-on: ubuntu-latest

    steps:
      - name: Download wheels
        uses: actions/download-artifact@v7
        with:
          pattern: wheel-*
          path: dist
          merge-multiple: true

      - name: Download source distribution
        uses: actions/download-artifact@v7
        with:
          name: sdist
          path: dist

      - name: Verify release artifact set
        shell: bash
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          shopt -s nullglob
          wheels=(dist/${PACKAGE_NAME}-${VERSION}-*.whl)
          sdists=(dist/${PACKAGE_NAME}-${VERSION}.tar.gz)

          if (( ${#wheels[@]} != 4 )); then
            echo "Expected 4 wheels for ${PACKAGE_NAME} ${VERSION}, found ${#wheels[@]}" >&2
            find dist -maxdepth 1 -type f -print >&2
            exit 1
          fi

          if (( ${#sdists[@]} != 1 )); then
            echo "Expected 1 source distribution for ${PACKAGE_NAME} ${VERSION}, found ${#sdists[@]}" >&2
            find dist -maxdepth 1 -type f -print >&2
            exit 1
          fi

          sha256sum "${wheels[@]}" "${sdists[@]}"

      - name: Upload complete release artifact set
        uses: actions/upload-artifact@v6
        with:
          name: release-dists
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  verify-wheel:
    name: Verify installed wheel (Python ${{ matrix.python-version }})
    needs:
      - preflight
      - assemble
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.14"

    steps:
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download release artifacts
        uses: actions/download-artifact@v7
        with:
          name: release-dists
          path: dist

      - name: Install wheel without source checkout
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
        run: >-
          python -m pip install --no-index --no-deps --find-links dist
          "${PACKAGE_NAME}==${VERSION}"

      - name: Verify installed API and package data
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          python - <<'PY'
          import importlib.metadata
          import os
          from pathlib import Path

          import ezdgn

          assert importlib.metadata.version("ezdgn") == ezdgn.__version__
          assert ezdgn.__version__ == os.environ["VERSION"]

          for name in (
              "Drawing",
              "DgnElement",
              "Line",
              "LineString",
              "Shape",
              "Text",
              "Arc",
              "Ellipse",
              "V7Document",
              "new",
              "read",
              "readfile",
              "scan_records",
          ):
              assert hasattr(ezdgn, name), name

          data = bytearray(1538)
          data[:4] = bytes.fromhex("08 09 fe 02")
          data[1536:] = b"\xff\xff"
          scan = ezdgn.scan_records(data)
          headers = ezdgn.inspect_headers(data)
          drawing = ezdgn.read(data)
          assert len(scan.records) == 1
          assert scan.termination == "end_marker"
          assert headers.design_settings.dimension == 2
          assert len(drawing.elements) == 1

          package_dir = Path(ezdgn.__file__).parent
          for relative_path in (
              "_core.pyi",
              "entities.py",
              "metadata.py",
              "plotting.py",
              "raw.py",
              "v8.py",
              "writer.py",
              "py.typed",
          ):
              assert (package_dir / relative_path).is_file(), relative_path
          PY

      - name: Verify command-line entry point
        run: ezdgn --version

  github-release:
    name: Create GitHub release
    if: github.event_name == 'push' && github.ref_type == 'tag'
    needs:
      - preflight
      - assemble
      - verify-wheel
      - pypi-publish
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v7
        with:
          name: release-dists
          path: dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*

  pypi-publish:
    name: Publish to PyPI
    if: github.event_name == 'push' && github.ref_type == 'tag'
    needs:
      - preflight
      - assemble
      - verify-wheel
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/ezdgn
    permissions:
      id-token: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v7
        with:
          name: release-dists
          path: dist

      - name: Publish release distributions
        uses: pypa/gh-action-pypi-publish@release/v1
